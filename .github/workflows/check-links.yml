name: Check links

on:
  # Weekly sweep — catches link rot over time.
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  # Validate links touched in pull requests.
  pull_request:
    paths:
      - "osint.html"
      - "scripts/check_links.py"
      - ".github/workflows/check-links.yml"
  # Allow running on demand from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check links
        id: check
        run: |
          python scripts/check_links.py osint.html | tee report.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      # On scheduled runs, open or refresh a tracking issue when links break.
      - name: Report broken links
        if: github.event_name == 'schedule' && steps.check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.txt', 'utf8');
            const title = 'Broken links detected by link checker';
            const body = [
              'The weekly link checker found one or more unreachable links.',
              '',
              '```',
              report.trim(),
              '```',
              '',
              `_Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}_`,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'broken-links',
            });

            if (existing.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['broken-links'],
              });
            }

      # Fail the job so the PR check / run is visibly red when links break.
      - name: Fail on broken links
        if: steps.check.outputs.exit_code != '0'
        run: |
          echo "::error::Broken links detected — see the report above."
          exit 1
