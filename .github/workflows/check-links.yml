name: Check links

on:
  # Weekly sweep — catches link rot over time and prunes dead links.
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  # Validate links touched in pull requests.
  pull_request:
    paths:
      - "osint.html"
      - "scripts/check_links.py"
      - ".github/workflows/check-links.yml"
  # Allow running on demand from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write # push the prune branch
  pull-requests: write # open/update the prune PR
  issues: write # track kept-but-broken links

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so PR runs can diff against the base branch.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check links
        id: check
        env:
          # On PRs, gate only on newly added links; otherwise scan everything.
          DIFF_ARG: ${{ github.event_name == 'pull_request' && format('--diff-base origin/{0}', github.base_ref) || '' }}
          # Off PRs, prune hard-dead links (404/410 / permanent DNS) in place.
          PRUNE_ARG: ${{ github.event_name != 'pull_request' && '--prune' || '' }}
        run: |
          python scripts/check_links.py osint.html $DIFF_ARG $PRUNE_ARG | tee report.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      # Did pruning actually remove anything? If so, raise a PR with the removals.
      - name: Detect pruned links
        id: pruned
        if: github.event_name != 'pull_request'
        run: |
          if [ -n "$(git status --porcelain osint.html README.md)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push prune branch
        if: steps.pruned.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C automated/prune-dead-links
          git add osint.html README.md
          git commit -m "Remove dead links flagged by the link checker"
          git push -f origin automated/prune-dead-links

      - name: Open or update prune PR
        if: steps.pruned.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.txt', 'utf8');
            const { owner, repo } = context.repo;
            const head = 'automated/prune-dead-links';
            const base = context.payload.repository.default_branch;
            const body = [
              'Automated removal of links with a definitive dead signal',
              '(HTTP 404/410 or a permanent DNS failure). Links that merely',
              'timed out or returned 5xx were **kept**, since those are often',
              'transient — review them in the tracking issue.',
              '',
              'Please sanity-check the removals before merging.',
              '',
              '```',
              report.trim(),
              '```',
              '',
              `_Run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}_`,
            ].join('\n');

            const existing = await github.rest.pulls.list({
              owner, repo, state: 'open', head: `${owner}:${head}`,
            });
            if (existing.data.length > 0) {
              await github.rest.pulls.update({
                owner, repo, pull_number: existing.data[0].number, body,
              });
            } else {
              await github.rest.pulls.create({
                owner, repo, title: 'Remove dead links flagged by link checker',
                head, base, body, draft: true,
              });
            }

      # Surface the kept-but-broken (possibly transient) links for a human to triage.
      - name: Report kept-but-broken links
        if: github.event_name == 'schedule' && steps.check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('report.txt', 'utf8');
            const { owner, repo } = context.repo;
            const title = 'Broken links need review (not auto-removed)';
            const body = [
              'The weekly link checker found links it did **not** auto-remove',
              '(timeouts, 5xx, rate-limits, or temporary DNS failures). These',
              'may be transient — verify before removing or replacing them.',
              '',
              '```',
              report.trim(),
              '```',
              '',
              `_Run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}_`,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'broken-links',
            });
            if (existing.data.length > 0) {
              await github.rest.issues.update({
                owner, repo, issue_number: existing.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner, repo, title, body, labels: ['broken-links'],
              });
            }

      # Make PR runs visibly red when a newly added link is broken.
      - name: Fail on broken links
        if: github.event_name == 'pull_request' && steps.check.outputs.exit_code != '0'
        run: |
          echo "::error::Newly added link(s) are broken — see the report above."
          exit 1
